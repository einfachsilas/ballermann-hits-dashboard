<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #1db954;
    --accent2: #f778ba;
    --up: #3fb950;
    --down: #f85149;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 18px;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
    max-width: 900px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .card .value { font-size: 28px; font-weight: 700; }
  .card .label { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .card.accent .value { color: var(--accent); }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1400px;
  }
  @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .panel h2 { font-size: 15px; margin: 0 0 14px; color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 12px; }
  .overview-table thead th {
    position: sticky;
    top: 0;
    background: var(--card);
    z-index: 2;
    box-shadow: 0 1px 0 var(--border);
  }
  tr.song-row { cursor: pointer; }
  tr.song-row:hover { background: #1c2129; }
  .pos { font-weight: 700; }
  .delta-up { color: var(--up); }
  .delta-down { color: var(--down); }
  .delta-same { color: var(--muted); }
  .delta-new { color: var(--accent2); font-size: 11px; }
  .chart-row { display: none; }
  .chart-row td { padding: 10px 8px 18px; }
  .chart-wrap { height: 160px; max-width: 600px; }
  canvas { max-width: 100%; }
  .full-width { grid-column: 1 / -1; }
  .playlist-view { display: none; }
  .playlist-view.active { display: block; }
  .breadth-pill {
    display: inline-block;
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 12px;
    font-weight: 600;
  }
  .breadth-pill.full { background: #1db95422; color: var(--up); }
  .breadth-pill.partial { background: #e3b34122; color: #e3b341; }
  .breadth-pill.low { background: #f8514922; color: var(--down); }
  .not-present { color: var(--muted); }
</style>
</head>

<script>
const combined = JSON.parse(document.getElementById('payload').textContent);
const overview = combined.overview;
const playlists = combined.playlists;
Chart.defaults.color = '#8b949e';
Chart.defaults.borderColor = '#30363d';
const palette = ['#1db954','#f778ba','#58a6ff','#f0883e','#a371f7','#3fb950','#db6d28','#e3b341','#ff7b72','#79c0ff'];

const tabsEl = document.getElementById('tabs');
const viewsEl = document.getElementById('views');

// Tab 0: Playlist-uebergreifende Uebersicht
const overviewTab = document.createElement('div');
overviewTab.className = 'tab active';
overviewTab.textContent = 'Alle Playlists – Übersicht';
tabsEl.appendChild(overviewTab);

const overviewView = document.createElement('div');
overviewView.className = 'playlist-view active';
overviewView.id = 'view-overview';
const playlistCols = overview.playlists.map(p => `<th>${p.name}</th>`).join('');
overviewView.innerHTML = `
  <div class="subtitle">Summerfield-Songs über alle ${overview.playlists.length} getrackten Playlists hinweg</div>
  <div class="grid">
    <div class="panel full-width">
      <h2>Präsenz je Playlist</h2>
      <table class="overview-table">
        <thead><tr><th>Song</th><th>Interpret</th><th>In wie vielen Playlists</th>${playlistCols}</tr></thead>
        <tbody id="overviewTableBody"></tbody>
      </table>
    </div>
  </div>
`;
viewsEl.appendChild(overviewView);

const overviewBody = overviewView.querySelector('#overviewTableBody');
const totalPlaylists = overview.playlists.length;
overview.songs.forEach(s => {
  const row = document.createElement('tr');
  const posCells = overview.playlists.map(p => {
    const pos = s.positions[p.slug];
    return pos ? `<td class="pos">#${pos}</td>` : `<td class="not-present">–</td>`;
  }).join('');
  let breadthClass = 'partial';
  if (s.breadth >= totalPlaylists) breadthClass = 'full';
  else if (s.breadth <= 1) breadthClass = 'low';
  row.innerHTML = `<td>${s.name}</td><td>${s.artists}</td><td><span class="breadth-pill ${breadthClass}">${s.breadth}/${totalPlaylists}</span></td>${posCells}`;
  overviewBody.appendChild(row);
});

overviewTab.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.playlist-view').forEach(v => v.classList.remove('active'));
  overviewTab.classList.add('active');
  overviewView.classList.add('active');
});

playlists.forEach((data, pIdx) => {
  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.textContent = data.playlist_name;
  tab.dataset.idx = pIdx;
  tabsEl.appendChild(tab);

  const view = document.createElement('div');
  view.className = 'playlist-view';
  view.id = `view-${pIdx}`;
  view.innerHTML = `
    <div class="subtitle">Zuletzt aktualisiert: ${data.last_updated} · ${data.dates.length} Snapshot(s) seit Trackingbeginn</div>
    <div class="cards">
      <div class="card accent"><div class="value">${data.summerfield_count}</div><div class="label">Summerfield-Songs</div></div>
      <div class="card"><div class="value">${data.total}</div><div class="label">Songs gesamt</div></div>
      <div class="card"><div class="value">${data.other_count}</div><div class="label">Andere Labels</div></div>
      <div class="card"><div class="value">${data.unresolved_count}</div><div class="label">Label unbekannt</div></div>
    </div>
    <div class="grid">
      <div class="panel full-width">
        <h2>Summerfield-Songs – aktuelle Position &amp; Verlauf</h2>
        <table>
          <thead><tr><th>Song</th><th>Interpret</th><th>Position</th><th>Δ vs. letzte Woche</th><th>Erstmals in Playlist</th></tr></thead>
          <tbody id="songTableBody-${pIdx}"></tbody>
        </table>
      </div>
      <div class="panel full-width" id="removedPanel-${pIdx}" style="display:none">
        <h2>⚠️ Nicht mehr in der Playlist</h2>
        <table>
          <thead><tr><th>Song</th><th>Interpret</th><th>Nicht mehr in Playlist seit</th><th>Letzte Position</th><th>Erstmals in Playlist</th></tr></thead>
          <tbody id="removedTableBody-${pIdx}"></tbody>
        </table>
      </div>
      <div class="panel">
        <h2>Label-Verteilung (aktuell)</h2>
        <div class="chart-wrap" style="height:320px"><canvas id="labelChart-${pIdx}"></canvas></div>
      </div>
      <div class="panel">
        <h2>Positions-Verlauf aller Summerfield-Songs</h2>
        <div class="chart-wrap" style="height:320px"><canvas id="overviewChart-${pIdx}"></canvas></div>
      </div>
      <div class="panel full-width">
        <h2>Label-Marktanteil über Zeit</h2>
        <div class="chart-wrap" style="height:280px"><canvas id="labelHistoryChart-${pIdx}"></canvas></div>
      </div>
    </div>
  `;
  viewsEl.appendChild(view);

  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.playlist-view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    view.classList.add('active');
    if (!view.dataset.rendered) renderPlaylist(data, pIdx);
  });
});

function renderPlaylist(data, pIdx) {
  const view = document.getElementById(`view-${pIdx}`);
  view.dataset.rendered = '1';

  const topLabels = data.label_distribution.slice(0, 12);
  new Chart(document.getElementById(`labelChart-${pIdx}`), {
    type: 'bar',
    data: {
      labels: topLabels.map(l => l.label),
      datasets: [{
        data: topLabels.map(l => l.count),
        backgroundColor: topLabels.map(l => l.label === 'Summerfield Records' ? '#1db954' : '#484f58'),
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { stepSize: 1 } } }
    }
  });

  new Chart(document.getElementById(`labelHistoryChart-${pIdx}`), {
    type: 'line',
    data: {
      labels: data.label_history.dates,
      datasets: data.label_history.series.map((s, i) => ({
        label: s.label,
        data: s.counts,
        borderColor: s.label === 'Summerfield Records' ? '#1db954' : palette[(i + 1) % palette.length],
        backgroundColor: s.label === 'Summerfield Records' ? '#1db954' : palette[(i + 1) % palette.length],
        borderWidth: s.label === 'Summerfield Records' ? 3 : 1.5,
        spanGaps: true,
        tension: 0.2,
      }))
    },
    options: {
      plugins: { legend: { labels: { boxWidth: 10, font: { size: 10 } } } },
      scales: { y: { ticks: { stepSize: 1 }, title: { display: true, text: 'Anzahl Songs' } } }
    }
  });

  new Chart(document.getElementById(`overviewChart-${pIdx}`), {
    type: 'line',
    data: {
      labels: data.dates,
      datasets: data.summerfield_songs.map((s, i) => ({
        label: s.name,
        data: data.dates.map(d => {
          const h = s.history.find(p => p.date === d);
          return h ? h.position : null;
        }),
        borderColor: palette[i % palette.length],
        backgroundColor: palette[i % palette.length],
        spanGaps: true,
        tension: 0.2,
      }))
    },
    options: {
      plugins: { legend: { display: data.summerfield_songs.length <= 8, labels: { boxWidth: 10, font: { size: 10 } } } },
      scales: { y: { reverse: true, title: { display: true, text: 'Position (1 = oben)' } } }
    }
  });

  const tbody = document.getElementById(`songTableBody-${pIdx}`);
  data.summerfield_songs.forEach((s, idx) => {
    const row = document.createElement('tr');
    row.className = 'song-row';
    let delta = '';
    if (s.prev_position === null || s.prev_position === undefined) {
      delta = '<span class="delta-new">neu</span>';
    } else {
      const diff = s.prev_position - s.position;
      if (diff > 0) delta = `<span class="delta-up">▲ +${diff}</span>`;
      else if (diff < 0) delta = `<span class="delta-down">▼ ${diff}</span>`;
      else delta = '<span class="delta-same">–</span>';
    }
    row.innerHTML = `<td>${s.name}</td><td>${s.artists}</td><td class="pos">#${s.position}</td><td>${delta}</td><td>${s.first_seen}</td>`;
    tbody.appendChild(row);

    const chartRow = document.createElement('tr');
    chartRow.className = 'chart-row';
    chartRow.id = `chart-row-${pIdx}-${idx}`;
    chartRow.innerHTML = `<td colspan="5"><div class="chart-wrap"><canvas id="chart-${pIdx}-${idx}"></canvas></div></td>`;
    tbody.appendChild(chartRow);

    row.addEventListener('click', () => {
      const cr = document.getElementById(`chart-row-${pIdx}-${idx}`);
      const isOpen = cr.style.display === 'table-row';
      cr.style.display = isOpen ? 'none' : 'table-row';
      if (!isOpen && !cr.dataset.rendered) {
        cr.dataset.rendered = '1';
        new Chart(document.getElementById(`chart-${pIdx}-${idx}`), {
          type: 'line',
          data: {
            labels: s.history.map(h => h.date),
            datasets: [{
              label: s.name,
              data: s.history.map(h => h.position),
              borderColor: '#1db954',
              backgroundColor: '#1db95433',
              spanGaps: true,
              fill: true,
              tension: 0.2,
            }]
          },
          options: {
            plugins: { legend: { display: false } },
            scales: { y: { reverse: true, title: { display: true, text: 'Position' } } }
          }
        });
      }
    });
  });

  if (data.removed_songs && data.removed_songs.length) {
    const removedPanel = document.getElementById(`removedPanel-${pIdx}`);
    removedPanel.style.display = 'block';
    const removedBody = document.getElementById(`removedTableBody-${pIdx}`);
    data.removed_songs.forEach(s => {
      const row = document.createElement('tr');
      row.innerHTML = `<td>${s.name}</td><td>${s.artists}</td><td class="delta-down">${s.removed_since}</td><td>#${s.last_position}</td><td>${s.first_seen}</td>`;
      removedBody.appendChild(row);
    });
  }
}
</script>
